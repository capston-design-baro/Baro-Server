name: Request EC2 Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "app/**"
      - "alembic/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"
      - "entrypoint.sh"
      - ".github/workflows/request-ec2-deploy.yml"
  workflow_dispatch:

jobs:
  request-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Baro-Deploy workflow
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.BARO_DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/capston-design-baro/Baro-Deploy/dispatches \
            -d '{"event_type":"deploy-backend-ai","client_payload":{"source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}"}}'
